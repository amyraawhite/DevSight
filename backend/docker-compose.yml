services:
  postgres:
    image: postgres:16
    container_name: devsight-db
    restart: always

    environment:
      POSTGRES_USER: devsight
      POSTGRES_PASSWORD: devsightpassword
      POSTGRES_DB: devsight

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: