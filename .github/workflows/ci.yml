name: DevSight CI

on:
  push:
  pull_request:

jobs:

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: devsight
          POSTGRES_PASSWORD: devsightpassword
          POSTGRES_DB: devsight

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://devsight:${secrets.POSTGRES_PASSWORD}@localhost:5432/devsight

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify FastAPI Imports
        run: |
          python -c "from app.main import app"

      - name: Install Security Tools
        run: |
          pip install ruff bandit

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run Bandit
        run: |
          bandit -r app

      - name: Run Backend Tests
        run: |
          pytest